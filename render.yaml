services:
  - type: web
    name: wellora-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: ZHIPU_API_KEY
        sync: false
      - key: ZHIPUAI_API_KEY
        sync: false
      - key: GLM_MODEL
        value: glm-4.6v-flash
      - key: OPENAI_API_KEY
        sync: false
      - key: PINECONE_API_KEY
        sync: false

  - type: web
    name: wellora-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
